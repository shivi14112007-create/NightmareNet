name: Nightly Integration Test

on:
  schedule:
    - cron: '0 2 * * *'  # Run at 2:00 AM UTC every day
  workflow_dispatch:      # Allow manual triggering

jobs:
  integration-test:
    name: Run End-to-End Pipeline Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          
      - name: Run E2E Integration Test
        run: |
          PYTHONPATH=. pytest -m slow tests/test_pipeline_e2e.py -v --tb=short
          
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::The nightly end-to-end integration test failed!"
          # Replace with actual notification logic if required (e.g. slack webhook)
