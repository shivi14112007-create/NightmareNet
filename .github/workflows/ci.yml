name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"

      - name: Lint with ruff
        run: ruff check nightmarenet/ scripts/ tests/

      - name: Type check with mypy
        run: mypy nightmarenet/ --ignore-missing-imports --disable-error-code import-untyped --disable-error-code operator --python-version 3.12
        if: matrix.python-version == '3.12'

      - name: Run tests with coverage
        run: PYTHONPATH=. pytest -m "not slow" --cov=nightmarenet --cov-report=xml --cov-report=term-missing

      - name: Set up Node.js
        if: matrix.python-version == '3.12'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        if: matrix.python-version == '3.12'
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[toml]>=1.7" "pip-audit>=2.7"
          pip install -e ".[api]"

      - name: Run bandit (static security analysis)
        run: |
          bandit -r nightmarenet -ll \
            --format json \
            --output bandit-report.json \
            --exit-zero
          bandit -r nightmarenet -ll --exit-zero

      - name: Run pip-audit (dependency vulnerability scan)
        run: |
          pip-audit \
            --progress-spinner=off \
            --format json \
            --output pip-audit-report.json \
            || true
          pip-audit --progress-spinner=off || true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json
          if-no-files-found: warn

  docker-build:
    name: Docker Build (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: docker/Dockerfile.api
            tag: nightmarenet/api:ci
          - image: worker
            dockerfile: docker/Dockerfile.worker
            tag: nightmarenet/worker:ci
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.tag }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=min

      - name: Smoke-test image
        run: echo "Build verified (image not loaded to save disk space)"
